services:

  nginx:
    image: nginx

    ports:
      - "8081:80"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

  backend:
    image: node:20

    working_dir: /app

    command: sh -c "npm install && node server.js"

    volumes:
      - ./backend:/app

    ports:
      - "3001:3000"
